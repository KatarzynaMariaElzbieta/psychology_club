services:
  web:
    build: .
    container_name: psychology_web
    restart: always
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: poetry run flask run --host=0.0.0.0 --port=5000

  worker:
    build: .
    container_name: psychology_worker
    restart: always
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: poetry run rq worker mailing --with-scheduler

  db:
    image: postgres:15
    container_name: psychology_db
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"                        # 👂 udostępnia port bazy

  redis:
    image: redis:7
    container_name: psychology_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
